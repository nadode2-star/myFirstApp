<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 | My App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>반가워요!</h1>
            <p class="subtitle">계정에 로그인하여 계속하세요.</p>
        </header>

        <form action="#" method="POST" id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="email">이메일 주소</label>
                <div class="input-wrapper">
                    <input type="email" id="email" name="email" placeholder="name@company.com" required>
                </div>
            </div>

            <div class="form-group">
                <label for="password">비밀번호</label>
                <div class="input-wrapper">
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="remember" name="remember">
                <label for="remember">로그인 상태 유지</label>
            </div>

            <button type="submit" class="btn">로그인</button>
        </form>

        <footer>
            계정이 없으신가요? <span onclick="goToSignupPage()" style="color: var(--primary-color); cursor: pointer; font-weight: 600; text-decoration: underline;">회원가입</span>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
