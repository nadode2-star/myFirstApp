<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>환영합니다 | My App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container welcome-container" style="max-width: 600px;">
        <span class="border-line line-top"></span>
        <span class="border-line line-right"></span>
        <span class="border-line line-bottom"></span>
        <span class="border-line line-left"></span>
        <header>
            <div style="font-size: 4rem; margin-bottom: 1rem;">🚀</div>
            <h1 id="welcomeMessage">환영합니다!</h1>

        </header>

        <div style="text-align: center; margin-top: 2rem; display: flex; flex-direction: column; gap: 1rem;">
            <p id="userInfo"
                style="background: rgba(255, 255, 255, 0.05); padding: 1.5rem; border-radius: 16px; border: 1px solid var(--glass-border); color: #e2e8f0;">
            </p>
            <button onclick="handleLogout()" class="btn btn-logout">로그아웃</button>
        </div>
    </div>

    <script src="zodiac.js"></script>
    <script src="script.js"></script>
    <script>
        // 현재 로그인된 유저 정보 표시
        document.addEventListener('DOMContentLoaded', () => {
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            if (!currentUser) {
                alert('로그인이 필요합니다!');
                window.location.href = 'login.html';
                return;
            }

            const zodiac = getZodiacSign(currentUser.birthdate);

            // 별자리에 맞는 배경 이미지 적용 (파일이 있는 경우에만)
            if (zodiac && zodiac.bg) {
                const bgPath = `zodiac_bg/${zodiac.bg}`;
                
                // 배경 스타일 즉시 적용 (welcome-bg.png 깜빡임 방지)
                document.body.style.backgroundImage = `url('${bgPath}')`;
                document.body.style.backgroundSize = '100% auto';
                document.body.style.backgroundAttachment = 'scroll';
                document.body.style.backgroundPosition = 'top center';

                // 이미지 파일 존재 여부 확인 및 높이 계산을 위한 프리로드
                const img = new Image();
                img.src = bgPath;
                img.onload = () => {
                    // 이미지 비율에 맞춰 전체를 볼 수 있도록 body 높이 설정
                    const aspectRatio = img.height / img.width;
                    
                    const updateHeight = () => {
                        const currentRequiredHeight = window.innerWidth * aspectRatio;
                        if (currentRequiredHeight > window.innerHeight) {
                            document.body.style.minHeight = `${currentRequiredHeight}px`;
                            document.body.style.alignItems = 'flex-start';
                            document.body.style.paddingTop = '10vh';
                            document.body.style.paddingBottom = '10vh';
                        } else {
                            document.body.style.minHeight = '100vh';
                            document.body.style.alignItems = 'center';
                            document.body.style.paddingTop = '0';
                            document.body.style.paddingBottom = '0';
                        }
                    };
                    
                    updateHeight();
                    window.addEventListener('resize', updateHeight);
                };
            } else {
                // 별자리가 없거나 배경이 없는 경우 기본 배경 클래스 추가
                document.body.classList.add('welcome-bg');
            }

            document.getElementById('welcomeMessage').innerText = `${currentUser.username}님, 환영합니다!`;
            document.getElementById('userInfo').innerHTML = `
                <div style="text-align: left; display: flex; flex-direction: column; gap: 0.8rem;">
                    <div><strong>이메일:</strong> ${currentUser.email}</div>
                    ${currentUser.birthdate ? `<div><strong>생년월일:</strong> ${currentUser.birthdate}</div>` : ''}
                    <div><strong>가입일:</strong> ${new Date(currentUser.signupDate).toLocaleDateString()}</div>
                    
                    ${zodiac ? `
                    <div style="margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.15);">
                        <div style="font-size: 1.3rem; color: #fbbf24; margin-bottom: 0.5rem; text-shadow: 0 0 10px rgba(251, 191, 36, 0.3);">✨ 당신의 별자리는 <strong>${zodiac.sign}</strong>입니다</div>
                        <div style="font-size: 1rem; color: #ffffff; line-height: 1.6; opacity: 0.95;">${zodiac.desc}</div>
                    </div>
                    ` : ''}
                </div>
            `;
        });
    </script>
</body>

</html>
