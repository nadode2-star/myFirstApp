<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 | My App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>계정 생성</h1>
            <p class="subtitle">모든 기능을 사용하려면 가입하세요.</p>
        </header>

        <form action="#" method="POST" id="signupForm" onsubmit="handleSignup(event)">
            <div class="form-group">
                <label for="username">사용자 이름</label>
                <div class="input-wrapper">
                    <input type="text" id="username" name="username" placeholder="예: 김도연" required>
                </div>
            </div>

            <div class="form-group">
                <label for="signupEmail">이메일 주소</label>
                <div class="input-wrapper">
                    <input type="email" id="signupEmail" name="signupEmail" placeholder="name@company.com" required>
                </div>
            </div>

            <div class="form-group">
                <label for="signupPassword">비밀번호</label>
                <div class="input-wrapper">
                    <input type="password" id="signupPassword" name="signupPassword" placeholder="••••••••" required>
                </div>
            </div>

            <div class="form-group">
                <label for="signupPasswordConfirm">비밀번호 확인</label>
                <div class="input-wrapper">
                    <input type="password" id="signupPasswordConfirm" name="signupPasswordConfirm" placeholder="••••••••" required>
                </div>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="terms" name="terms" required>
                <label for="terms">이용약관 및 개인정보 처리방침에 동의합니다.</label>
            </div>

            <button type="submit" class="btn">가입하기</button>
        </form>

        <footer>
            이미 계정이 있으신가요? <span onclick="goToLoginPage()" style="color: var(--primary-color); cursor: pointer; font-weight: 600; text-decoration: underline;">로그인</span>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
